<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه آنلاین</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>فروشگاه آنلاین</h1>

    <div class="cart">
        🛒 سبد خرید:
        <span id="cart-count">0</span>
    </div>
</header>

<section class="search-box">
    <input type="text" id="searchInput" placeholder="جستجوی محصول...">
</section>

<section class="products" id="products">

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>لپ تاپ</h3>
        <p>25,000,000 تومان</p>
        <button onclick="addToCart()">افزودن به سبد</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>موبایل</h3>
        <p>15,000,000 تومان</p>
        <button onclick="addToCart()">افزودن به سبد</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>هدفون</h3>
        <p>2,000,000 تومان</p>
        <button onclick="addToCart()">افزودن به سبد</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="">
        <h3>ساعت هوشمند</h3>
        <p>4,500,000 تومان</p>
        <button onclick="addToCart()">افزودن به سبد</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
