<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به حساب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-box">

    <!-- آیکون بالا -->
    <div style="font-size: 48px; margin-bottom: 12px;">⚡</div>

    <h2>Welcome !</h2>
    <p>Log in to continue.</p>

    <!-- فرم لاگین -->
    <form id="loginForm">

      <input type="email" id="emailInput" placeholder="Email" required>
      <input type="password" id="passInput" placeholder="Password" required>

      <!-- پیام خطا (اول مخفیه) -->
      <p id="errorMsg" style="color: red; font-size: 13px; display: none;">
      ! Wrong Email or Password
      </p>

      <button type="submit" class="hover-up">Log in</button>

    </form>

    <div class="login-footer">
       Don't have account? <a href="#">Sign in</a>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
